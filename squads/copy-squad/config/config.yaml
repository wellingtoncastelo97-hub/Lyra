squad:
  name: copy-squad
  display_name: "Copy Squad"
  version: "1.0.0"
  domain: "Elite copywriting — direct response, email, funnels, VSLs, sales letters, offers, and brand copy"
  description: |
    Squad of 23 copywriting agents — 22 legendary copywriters + 1 orchestrator.
    Each agent is a high-fidelity clone of a real-world copywriting master covering
    direct response, email, funnels, VSLs, sales letters, offers, and brand copywriting.
  keywords: [copywriting, direct response, sales letter, email, VSL, funnel, headline, offer, ad copy, launch, bullets, brand copy]
  entry_agent: copy-chief
  created_at: "2026-03-05"

tiers:
  tier_0:
    name: "Orchestration"
    agents: [copy-chief]
    purpose: "Triage copywriting requests, route to the right specialist, quality control"
  tier_1a:
    name: "Direct Response Legends"
    agents: [gary-halbert, eugene-schwartz, claude-hopkins, gary-bencivenga, robert-collier, john-carlton, jim-rutz]
    purpose: "Classic direct response masters — long-form, print, mail"
  tier_1b:
    name: "Modern Copy & Funnels"
    agents: [dan-kennedy, frank-kern, russell-brunson, todd-brown, stefan-georgi, jon-benson, ry-schwartz]
    purpose: "Digital-era copy — VSLs, funnels, webinars, launches"
  tier_1c:
    name: "Email & Relationship"
    agents: [ben-settle, andre-chaperon, dan-koe]
    purpose: "Email sequences, daily emails, nurture copy"
  tier_1d:
    name: "Offers & Sales Pages"
    agents: [joe-sugarman, david-ogilvy, clayton-makepeace, parris-lampropoulos, david-deutsch]
    purpose: "Offer architecture, print ads, financial/health copy"

