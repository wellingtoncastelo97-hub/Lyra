squad:
  name: traffic-masters
  display_name: "Traffic Masters"
  version: "1.0.0"
  domain: "Paid traffic acquisition across all major platforms — media buying, creative, analytics, and scaling"
  description: |
    16 specialized agents mastering paid traffic acquisition across all major platforms.
    Combines real-person expert agents (world-class media buyers and ad strategists) with
    functional specialist agents for creative analysis, performance optimization, scaling,
    and fiscal management. Covers Facebook/Meta, YouTube, Google, TikTok, and LinkedIn.
  keywords: [paid traffic, Facebook ads, Google ads, YouTube ads, TikTok ads, media buying, creative, scaling, ROAS, CPA, tracking, pixels, attribution, ad budget]
  entry_agent: traffic-chief
  created_at: "2026-03-05"

tiers:
  tier_0:
    name: "Orchestration"
    agents: [traffic-chief]
    purpose: "Diagnose traffic challenges, route to the right specialist by platform or function"
  tier_1_experts:
    name: "Platform Expert Agents"
    agents: [molly-pittman, ralph-burns, depesh-mandalia, nicholas-kusmich, tom-breeze, kasim-aslam, pedro-sobral]
    purpose: "World-class traffic experts cloned from real practitioners with proven track records"
  tier_1_functional:
    name: "Functional Specialists"
    agents: [ad-midas, media-buyer, performance-analyst, creative-analyst, scale-optimizer, pixel-specialist, ads-analyst, fiscal]
    purpose: "Specialized agents for specific traffic management functions"

