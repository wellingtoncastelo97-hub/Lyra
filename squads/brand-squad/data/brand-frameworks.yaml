# Brand Frameworks Reference
# Referenced by specialist agents for structured methodology application

frameworks:
  aaker_brand_equity:
    source: "David Aaker — Managing Brand Equity (1991), Building Strong Brands (1996)"
    description: "Five-pillar model for measuring and building brand equity"
    components:
      - name: "Brand Awareness"
        description: "The strength of the brand's presence in the consumer's mind. Ranges from recognition (have I heard of it?) to top-of-mind (first brand I think of in the category)."
      - name: "Perceived Quality"
        description: "The customer's perception of the overall quality or superiority of the product relative to alternatives. Not actual quality — perceived quality."
      - name: "Brand Associations"
        description: "Anything mentally linked to the brand — attributes, benefits, attitudes, images, symbols. The richer and more positive, the stronger the equity."
      - name: "Brand Loyalty"
        description: "The attachment customers have to the brand. Moves from switchers to satisfied buyers to committed advocates. Loyal customers are the brand's most valuable asset."
      - name: "Proprietary Brand Assets"
        description: "Trademarks, patents, distribution relationships, and other assets that provide competitive advantage and protect equity."
    when_to_use: "Brand audits, equity measurement, strategic planning, portfolio management"

  kapferer_identity_prism:
    source: "Jean-Noel Kapferer — The New Strategic Brand Management (1992)"
    description: "Six-facet model for defining brand identity as a coherent system"
    components:
      - name: "Physique"
        description: "The brand's physical features and visual identity — logo, colors, packaging, product design. What the brand looks like."
      - name: "Personality"
        description: "The brand's character and human traits. If the brand were a person, how would you describe their personality?"
      - name: "Culture"
        description: "The values, principles, and origin the brand draws from. The ideology and belief system behind the brand."
      - name: "Relationship"
        description: "The type of relationship the brand establishes with its customers. Transactional? Mentoring? Friendship? Partnership?"
      - name: "Reflection"
        description: "The outward mirror — how the target customer sees themselves through the brand. The aspirational self-image the brand enables."
      - name: "Self-Image"
        description: "The inward mirror — how customers feel internally when they use the brand. The internal dialogue the brand supports."
    when_to_use: "Brand identity design, consistency audits, identity refresh, internal brand alignment"

  ries_positioning:
    source: "Al Ries & Jack Trout — Positioning: The Battle for Your Mind (1981)"
    description: "The foundational theory of brand positioning — owning a distinct space in the prospect's mind"
    components:
      - name: "Category Ladder"
        description: "Consumers organize brands in mental ladders by category. The goal is to be on the top rung of a ladder, even if you have to create a new one."
      - name: "First Mover Advantage"
        description: "It is better to be first in a category than to be better. If you cannot be first, create a category where you are first."
      - name: "Own a Word"
        description: "The most powerful positioning is owning a single word in the prospect's mind. Volvo = safety. FedEx = overnight."
      - name: "Law of the Opposite"
        description: "If you are not the leader, position against the leader. Be the opposite. If they are big, be small. If they are old, be new."
      - name: "Narrow Focus"
        description: "Sacrifice breadth for depth. A brand that tries to be everything to everyone means nothing to anyone."
    when_to_use: "Positioning strategy, competitive analysis, category creation, tagline development"

  sharp_distinctiveness:
    source: "Byron Sharp — How Brands Grow (2010)"
    description: "Evidence-based branding focused on mental and physical availability"
    components:
      - name: "Mental Availability"
        description: "The probability that a buyer will think of the brand in a buying situation. Built through consistent, broad-reaching communication."
      - name: "Physical Availability"
        description: "How easy it is to find and buy the brand. Distribution, shelf space, digital presence, accessibility."
      - name: "Distinctive Brand Assets"
        description: "Visual and verbal elements that are uniquely associated with the brand — colors, shapes, sounds, characters, taglines. Distinctiveness over differentiation."
      - name: "Reach over Frequency"
        description: "Reaching more people once is more effective than reaching fewer people many times. Prioritize broad reach."
      - name: "Category Entry Points"
        description: "The buying situations and cues that trigger the need for the category. Brands must link themselves to as many entry points as possible."
    when_to_use: "Growth strategy, media planning, brand asset development, market penetration"

  twelve_archetypes:
    source: "Carl Jung, applied to branding by Margaret Mark & Carol Pearson (The Hero and the Outlaw, 2001)"
    description: "Twelve universal character patterns that brands can embody to create emotional connection"
    components:
      - name: "Innocent"
        description: "Desire: Paradise. Goal: Happiness. Fear: Doing wrong. Example: Dove, Coca-Cola"
      - name: "Explorer"
        description: "Desire: Freedom. Goal: Discovery. Fear: Conformity. Example: Jeep, Patagonia"
      - name: "Sage"
        description: "Desire: Truth. Goal: Understanding. Fear: Ignorance. Example: Google, BBC"
      - name: "Hero"
        description: "Desire: Mastery. Goal: Achievement. Fear: Weakness. Example: Nike, FedEx"
      - name: "Outlaw"
        description: "Desire: Liberation. Goal: Revolution. Fear: Powerlessness. Example: Harley-Davidson, Virgin"
      - name: "Magician"
        description: "Desire: Transformation. Goal: Making dreams real. Fear: Unintended consequences. Example: Apple, Disney"
      - name: "Regular Guy"
        description: "Desire: Belonging. Goal: Connection. Fear: Standing out. Example: IKEA, Target"
      - name: "Lover"
        description: "Desire: Intimacy. Goal: Relationship. Fear: Rejection. Example: Chanel, Godiva"
      - name: "Jester"
        description: "Desire: Enjoyment. Goal: Having a great time. Fear: Boredom. Example: Old Spice, M&Ms"
      - name: "Caregiver"
        description: "Desire: Service. Goal: Help others. Fear: Selfishness. Example: Johnson & Johnson, TOMS"
      - name: "Creator"
        description: "Desire: Innovation. Goal: Create something of value. Fear: Mediocrity. Example: LEGO, Adobe"
      - name: "Ruler"
        description: "Desire: Control. Goal: Order and prosperity. Fear: Chaos. Example: Mercedes, Rolex"
    when_to_use: "Brand personality development, messaging strategy, content creation, visual identity direction"

  storybrand_sb7:
    source: "Donald Miller — Building a StoryBrand (2017)"
    description: "Seven-element framework for clarifying brand messaging through story structure"
    components:
      - name: "Character"
        description: "The customer is the hero. Define who they are and what they want."
      - name: "Problem"
        description: "The villain, and the external, internal, and philosophical problems the hero faces."
      - name: "Guide"
        description: "The brand is the guide — expressing empathy and authority."
      - name: "Plan"
        description: "A simple 3-step plan that removes confusion and builds trust."
      - name: "Call to Action"
        description: "A direct CTA (buy, sign up) and a transitional CTA (download, watch)."
      - name: "Failure"
        description: "The negative stakes — what happens if the hero does not act."
      - name: "Success"
        description: "The positive transformation — what life looks like after."
    when_to_use: "Website copy, brand messaging, sales scripts, marketing collateral, pitch decks"

  wheeler_brand_identity_process:
    source: "Alina Wheeler — Designing Brand Identity (2003, 5th ed. 2017)"
    description: "Five-phase process for designing and implementing brand identity"
    components:
      - name: "Phase 1: Conducting Research"
        description: "Audit existing brand, analyze competitors, interview stakeholders, survey customers. Understand before creating."
      - name: "Phase 2: Clarifying Strategy"
        description: "Define positioning, brand architecture, naming strategy, and key messages. Strategy before design."
      - name: "Phase 3: Designing Identity"
        description: "Explore visual concepts, design the logo, select typography and colors, develop the visual system."
      - name: "Phase 4: Creating Touchpoints"
        description: "Apply the identity to all brand touchpoints — business cards, website, packaging, signage, digital, environmental."
      - name: "Phase 5: Managing Assets"
        description: "Build brand guidelines, create templates, train the team, establish governance for ongoing brand management."
    when_to_use: "Complete brand identity projects, rebrands, brand system design, identity governance"
