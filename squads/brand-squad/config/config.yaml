squad:
  name: brand-squad
  display_name: "Brand Squad"
  version: "1.0.0"
  domain: "Brand strategy, identity, positioning, architecture, naming, archetypes, and growth"
  description: |
    The definitive brand strategy squad — 10 legendary brand thinkers cloned as AI agents
    plus 4 functional specialists and 1 orchestrator. From Aaker's Brand Equity to Sharp's
    evidence-based marketing, from Kapferer's Identity Prism to Miller's StoryBrand — this
    squad covers every dimension of brand building, positioning, identity, architecture,
    and growth.
  keywords: [brand equity, positioning, brand identity, messaging, brand architecture, naming, archetypes, visual identity, StoryBrand, luxury brand, startup brand, differentiation, distinctiveness]
  entry_agent: brand-chief
  created_at: "2026-03-05"

tiers:
  tier_0:
    name: "Brand Orchestrator"
    agents: [brand-chief]
    purpose: "Route brand challenges to the right specialist based on the brand problem domain"
  tier_1_strategy:
    name: "Brand Strategy & Equity"
    agents: [david-aaker, kevin-keller, jean-noel-kapferer]
    purpose: "Brand equity models, identity systems, strategic brand management"
  tier_1_positioning:
    name: "Positioning & Differentiation"
    agents: [al-ries, byron-sharp, marty-neumeier]
    purpose: "Market positioning, category strategy, differentiation, evidence-based growth"
  tier_1_building:
    name: "Brand Building & Communication"
    agents: [donald-miller, denise-yohn, emily-heyward]
    purpose: "StoryBrand messaging, brand-culture fusion, startup branding"
  tier_1_identity:
    name: "Brand Identity & Expression"
    agents: [alina-wheeler, archetype-consultant, naming-strategist]
    purpose: "Visual identity systems, brand archetypes, naming strategy"
  tier_2_support:
    name: "Specialized Support"
    agents: [domain-scout, miller-sticky-brand]
    purpose: "Domain availability, StoryBrand implementation"

